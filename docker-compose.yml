services:

  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "10MB"

  api-1:
    build:
      context: .
      dockerfile: fraud-api/Dockerfile
    environment:
      - APP_REFERENCES_PATH=/resources/references.bin
    volumes:
      - ./resources/references.bin:/resources/references.bin:ro
    networks:
      - rinha-net
    cpuset: "0"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  api-2:
    build:
      context: .
      dockerfile: fraud-api/Dockerfile
    environment:
      - APP_REFERENCES_PATH=/resources/references.bin
    volumes:
      - ./resources/references.bin:/resources/references.bin:ro
    networks:
      - rinha-net
    cpuset: "1"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

networks:
  rinha-net:
    driver: bridge
