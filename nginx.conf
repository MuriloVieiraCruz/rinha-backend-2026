worker_processes 1;

events {
    worker_connections 2048;
}

http {
    access_log off;

    upstream api {
        least_conn;
        server api-1:8080;
        server api-2:8080;
        keepalive 32;
    }

    server {
        listen 9999;

        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_connect_timeout 1s;
            proxy_send_timeout    5s;
            proxy_read_timeout    5s;
        }
    }
}
