worker_processes 1;

events {
    worker_connections 4096;
    use epoll;
}

http {
    access_log off;
    error_log /dev/null;

    upstream backend {
        server api-1:8080;
        server api-2:8080;
        keepalive 300;
    }

    server {
        listen 9999;

        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
